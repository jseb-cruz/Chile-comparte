<!DOCTYPE html>
<html lang="en" xmlns:th ="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Management System</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        .glass-panel{
            background: rgba(20,20,20,0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);

        }

        .menu-shell{
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 28px;
            background: rgba(0,0,0,0.20);
        }

        .active-item{
            background: linear-gradient(90deg, #ff163d 0%, #ff375f 100%);
            color: white;
            box-shadow: 0 6px 18px rgba(255,32,76,0.35);

        }

        .menu-item:hover{
            background: rgba(255,255,255,0.10);

        }
    </style>
</head>
<body>
<aside th:fragment="sidebar"
       class="w-[230px] min-h-screen-text-white glass-panel
flex flex-col justify-between shadow-2xl">
    <div class="p-4">
        <div class="flex items-center gap-2 text-sm
        font-medium text-white/90 mb-3">

            <span class="w-3 h-3 rounded-full bg-green-400 inline-block"></span>
            <span>ACTIVE</span>
        </div>

        <div class="bg-black/45 rounded-[28px] p-5 text-center
            border border-white/10">
            <p class="text-sm tracking-[0.2em] text-white/85">Admin</p>
            <div class="w-16 h-16 mx-auto mt-3 rounded-full bg-cyan-400
                items-center justify-center text-2xl text-slate-800">
                <i class="fa-solid fa-user-tie"></i>
            </div>
            <p class=" mt-3 tex-sm text-white/80">ADMINISTRATOR</p>
<h2 class="text-3xl tracking-[0.25] font-light">TESLA</h2>
        </div>
        <div class="mt-5 mb-3 text-center">
            <div class="menu-shell py-2 text-white/95 tracking-[0.35] text-sm">
                MENU

            </div>
        </div>
<nav class="menu-shell p-2 space-y-1 text-sm tracking-[0.2em]">
    <a th:href="@{/}"
    class="menu-item flex items-center gap-3 px-3
py-3 rounded-xl transition"
    th:classappend="${activeMenu == 'home'}? 'active-item'">
        <i class="fa-solid fa-house"></i>
        <span>HOME</span>
    </a>
    <a th:href="@{/login}"
    class="menu-item flex item-center gap-3 px-4 py-3
rounded-xl transition text-white/95">
        <i class="fa-solid fa-right-to-bracket"></i>
        <span>LOGIN</span>
    </a>
    <a th:href="@{/products}"
    class="menu-item flex items-center gap-3 px-4 py-3
rounded-xl transition text-white/95"
       th:classappend="${activeMenu == 'products'}? 'active-item'">
        <i class="fa-solid fa-car"></i>
        <span>PRODUCTS</span>

    </a>
    <a th:href="@{/sales}"
       class="menu-item flex items-center gap-3 px-4 py-3
rounded-xl transition text-white/95">
        <i class="fa-solid fa-cart-shopping"></i>
        <span>SALES</span>

    </a>

    <a th:href="@{/users}"
       class="menu-item flex items-center gap-3 px-4 py-3
rounded-xl transition text-white/95">
        <i class="fa-solid fa-users"></i>
        <span>USERS</span>

    </a>
    <a th:href="@{/dashboard}"
       class="menu-item flex items-center gap-3 px-4 py-3
rounded-xl transition text-white/95">
        <i class="fa-solid fa-chart-line"></i>
        <span>DASHBOARD</span>

    </a>
</nav>
    </div>
    <div class="p-4">
        <a th:href="@{/logout}"
        class="flex items--center gap-3 text-yellow-400
hover:text-yellow-300 transition text-lg tracking-[0.2em]">
            <i class="fa-solid fa-power-off text-3xl"></i>
            <span class="text-white">LOG OUT</span>
        </a>

    </div>

</aside>

</body>
</html>
